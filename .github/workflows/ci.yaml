name: CI

# Builds Zydis (4.1.1, with Zycore) across toolchains, architectures, link types
# and CRTs, and publishes the prebuilt libraries so downstream projects can either
# build from source (FetchContent) or download the variant that matches their
# environment and compile options.
#
# Stages:
#   1. version      - compute the version strings once.
#   2. portable     - Linux/GCC sanity build (not released).
#   3. build-msvc   - modern Visual Studio: shared (/MT) and static (/MT and /MD).
#   4. build-wdk7   - legacy WDK 7 (VC9): static and shared.
#   5. release      - immutable per-build release on vX.Y.Z.<build> plus a rolling
#                     vX.Y.Z release whose asset names are stable.

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  ZYDIS_VERSION: "4.1.1"

jobs:
  # 1. Compute version strings once and share them with downstream jobs.
  version:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.compute.outputs.base }}
      version: ${{ steps.compute.outputs.version }}
      alias: ${{ steps.compute.outputs.alias }}
    steps:
      - name: Compute version strings
        id: compute
        run: |
          BASE="${ZYDIS_VERSION}"
          ALIAS="v${BASE}"
          VERSION="${ALIAS}.${GITHUB_RUN_NUMBER}"
          echo "base=${BASE}" >> "${GITHUB_OUTPUT}"
          echo "alias=${ALIAS}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Alias tag:     ${ALIAS}"
          echo "Versioned tag: ${VERSION}"

  # 2. Sanity build on Linux/GCC (the sources are also consumed under GCC/Clang).
  #    Not packaged - this only proves the source still builds portably.
  portable:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build static and shared
        run: |
          cmake -S . -B build-static -DBUILD_SHARED=OFF -DZYDIS_VERSION=${{ needs.version.outputs.base }}
          cmake --build build-static --parallel
          cmake -S . -B build-shared -DBUILD_SHARED=ON -DZYDIS_VERSION=${{ needs.version.outputs.base }}
          cmake --build build-shared --parallel

  # 3. Modern Visual Studio libraries. Shared (DLL) is /MT only (self-contained);
  #    static is shipped in both /MT and /MD so the consumer can match its own CRT.
  build-msvc:
    needs: version
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, cmake_platform: x64,   link: shared, shared: "ON",  runtime: MultiThreaded,    label: shared }
          - { arch: x86, cmake_platform: Win32, link: shared, shared: "ON",  runtime: MultiThreaded,    label: shared }
          - { arch: x64, cmake_platform: x64,   link: static, shared: "OFF", runtime: MultiThreaded,    label: static-mt }
          - { arch: x64, cmake_platform: x64,   link: static, shared: "OFF", runtime: MultiThreadedDLL, label: static-md }
          - { arch: x86, cmake_platform: Win32, link: static, shared: "OFF", runtime: MultiThreaded,    label: static-mt }
          - { arch: x86, cmake_platform: Win32, link: static, shared: "OFF", runtime: MultiThreadedDLL, label: static-md }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -B build -S . -G "Visual Studio 17 2022" -A ${{ matrix.cmake_platform }}
          -DBUILD_SHARED=${{ matrix.shared }}
          -DCMAKE_MSVC_RUNTIME_LIBRARY=${{ matrix.runtime }}
          -DZYDIS_VERSION=${{ needs.version.outputs.base }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $label = "${{ matrix.label }}"

          New-Item -ItemType Directory -Force pkg/lib | Out-Null
          if ("${{ matrix.link }}" -eq "shared") {
            New-Item -ItemType Directory -Force pkg/bin | Out-Null
            Copy-Item build/Release/Zydis.dll, build/Release/Zycore.dll pkg/bin/
          }
          Copy-Item build/Release/Zydis.lib, build/Release/Zycore.lib pkg/lib/
          Copy-Item include pkg/include -Recurse
          Copy-Item LICENSE pkg/
          Compress-Archive -Path pkg/* -DestinationPath "zydis-$version-msvc-$arch-$label.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zydis-msvc-${{ matrix.arch }}-${{ matrix.label }}
          path: zydis-*.zip

  # 4. Legacy WDK 7 (VC9) libraries: static and shared, x64 and x86.
  build-wdk7:
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, wdk_arch: amd64, link: static, shared: "OFF", label: static }
          - { arch: x64, wdk_arch: amd64, link: shared, shared: "ON",  label: shared }
          - { arch: x86, wdk_arch: i386,  link: static, shared: "OFF", label: static }
          - { arch: x86, wdk_arch: i386,  link: shared, shared: "ON",  label: shared }
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup WDK7
        id: wdk7
        uses: tinysec/setup-wdk7@v1

      - name: Configure and build
        shell: cmd
        run: |
          @echo off
          if not "${{ steps.wdk7.outputs.found }}"=="true" (
            echo setup-wdk7 did not prepare WDK7.
            exit /b 1
          )
          cmake -S . -B build -G "${{ steps.wdk7.outputs.cmake-generator }}" ^
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.wdk7.outputs.toolchain-file }}" ^
            -DWDK7_ARCH=${{ matrix.wdk_arch }} -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED=${{ matrix.shared }} -DZYDIS_VERSION=${{ needs.version.outputs.base }}
          if errorlevel 1 exit /b 1
          cmake --build build
          if errorlevel 1 exit /b 1

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.version }}"
          $arch = "${{ matrix.arch }}"
          $label = "${{ matrix.label }}"

          New-Item -ItemType Directory -Force pkg/lib | Out-Null
          if ("${{ matrix.link }}" -eq "shared") {
            New-Item -ItemType Directory -Force pkg/bin | Out-Null
            Copy-Item build/Zydis.dll, build/Zycore.dll pkg/bin/
          }
          Copy-Item build/Zydis.lib, build/Zycore.lib pkg/lib/
          Copy-Item include pkg/include -Recurse
          Copy-Item LICENSE pkg/
          Compress-Archive -Path pkg/* -DestinationPath "zydis-$version-wdk7-$arch-$label.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zydis-wdk7-${{ matrix.arch }}-${{ matrix.label }}
          path: zydis-*.zip

  # 5. Publish the versioned release and refresh the rolling alias release.
  release:
    needs: [ version, portable, build-msvc, build-wdk7 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish versioned release, move alias tag, refresh rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          ALIAS: ${{ needs.version.outputs.alias }}
          BASE: ${{ needs.version.outputs.base }}
        run: |
          set -euo pipefail

          # 1. Immutable per-build release on the 4-part tag, kept as "latest".
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes "Automated build of Zydis ${BASE} (build ${GITHUB_RUN_NUMBER}): modern MSVC (x64/x86, static /MT and /MD, shared) and legacy WDK 7 (x64/x86, static and shared)." \
            --latest \
            $(find dist -type f | sort)

          # 2. Re-point the 3-part alias tag to this build's commit.
          git tag --force "${ALIAS}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${ALIAS}"

          # 3. Refresh the rolling release on the alias tag with build-number-free
          #    asset names, so the download URLs are stable across builds, e.g.
          #    releases/download/v4.1.1/zydis-msvc-x64-static-mt.zip.
          mkdir -p alias
          for f in $(find dist -type f); do
            base="$(basename "${f}")"
            cp "${f}" "alias/zydis-${base#zydis-${VERSION}-}"
          done

          gh release delete "${ALIAS}" --yes --cleanup-tag=false || true
          gh release create "${ALIAS}" \
            --target "${GITHUB_SHA}" \
            --title "${ALIAS} (latest: ${VERSION})" \
            --notes "Rolling release tracking the latest build (currently ${VERSION}). Asset names are stable across builds for fixed download URLs." \
            --latest=false \
            $(find alias -type f | sort)
