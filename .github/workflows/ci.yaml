name: build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

env:
  ZYDIS_VERSION: 4.1.1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: derive version
        id: v
        shell: bash
        run: |
          VERSION="${ZYDIS_VERSION}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match ZYDIS_VERSION ${VERSION}"
              exit 1
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Zydis version: ${VERSION}"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: configure
        run: cmake -S . -B build -DZYDIS_VERSION=${{ needs.version.outputs.version }}

      - name: build
        run: cmake --build build --parallel

      # This fork is consumed only as a local CMake dependency (FetchContent /
      # add_subdirectory) - no install()/find_package(). Verify that consumption
      # path directly: build a tiny consumer that add_subdirectory()s this tree
      # and links the Zydis::Zydis target.
      - name: verify local consumption
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(zydis_smoke LANGUAGES C)
          add_subdirectory("${ZYDIS_SOURCE_DIR}" zydis_build)
          add_executable(smoke main.c)
          target_link_libraries(smoke PRIVATE Zydis::Zydis)
          EOF
          cat > smoke/main.c <<'EOF'
          #include <Zydis/Zydis.h>
          int main(void) { return ZydisGetVersion() == 0; }
          EOF
          cmake -S smoke -B smoke-build -DZYDIS_SOURCE_DIR="${GITHUB_WORKSPACE}"
          cmake --build smoke-build --parallel

  release:
    needs:
      - version
      - build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Consumers pull this fork by git tag (FetchContent), so the release only
      # needs to exist - GitHub attaches the source archives automatically.
      - name: create release
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
