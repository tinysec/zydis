name: build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

# The release tags (v<X.Y.Z>.<build> and the v<X.Y.Z> alias) are created BY this
# workflow, so it must not trigger on tag pushes (that would recurse).

env:
  ZYDIS_VERSION: 4.1.1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.v.outputs.base }}        # X.Y.Z  - the Zydis semver
      version: ${{ steps.v.outputs.version }}  # X.Y.Z.<build> - per-CI-build
    steps:
      - name: derive version
        id: v
        shell: bash
        run: |
          BASE="${ZYDIS_VERSION}"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build version: ${VERSION} (alias v${BASE})"

  # Sanity build on a modern toolchain - the fork is also consumed under regular
  # MSVC/GCC/Clang. Builds static and shared, then verifies the local
  # add_subdirectory consumption path.
  portable:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: build static and shared
        run: |
          cmake -S . -B build-static -DBUILD_SHARED=OFF -DZYDIS_VERSION=${{ needs.version.outputs.base }}
          cmake --build build-static --parallel
          cmake -S . -B build-shared -DBUILD_SHARED=ON -DZYDIS_VERSION=${{ needs.version.outputs.base }}
          cmake --build build-shared --parallel

      - name: verify local consumption (add_subdirectory)
        run: |
          mkdir -p smoke
          cat > smoke/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(zydis_smoke LANGUAGES C)
          add_subdirectory("${ZYDIS_SOURCE_DIR}" zydis_build)
          add_executable(smoke main.c)
          target_link_libraries(smoke PRIVATE Zydis::Zydis)
          EOF
          cat > smoke/main.c <<'EOF'
          #include <Zydis/Zydis.h>
          int main(void) { return ZydisGetVersion() == 0; }
          EOF
          cmake -S smoke -B smoke-build -DZYDIS_SOURCE_DIR="${GITHUB_WORKSPACE}"
          cmake --build smoke-build --parallel

  # WDK7 (VC9) release artifacts: static libs + shared DLLs with import libs,
  # plus headers, for x86 (i386) and x64 (amd64).
  package:
    needs: version
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [i386, amd64]
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup wdk7
        id: wdk7
        uses: tinysec/setup-wdk7@v1

      - name: build static + shared and stage artifacts
        shell: cmd
        run: |
          @echo off
          setlocal EnableExtensions
          if not "${{ steps.wdk7.outputs.found }}"=="true" (
            echo setup-wdk7 did not prepare WDK7.
            exit /b 1
          )
          set "BASE=${{ needs.version.outputs.base }}"
          set "ARCH=${{ matrix.arch }}"
          set "STAGE=dist\zydis-v%BASE%-wdk7-%ARCH%"
          if exist dist rmdir /s /q dist
          mkdir "%STAGE%\lib\static"
          mkdir "%STAGE%\lib\shared"
          xcopy /e /i /y include "%STAGE%\include" >nul
          copy /y LICENSE "%STAGE%\" >nul

          rem --- static library ---
          cmake -S . -B build-static -G "${{ steps.wdk7.outputs.cmake-generator }}" ^
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.wdk7.outputs.toolchain-file }}" ^
            -DWDK7_ARCH=%ARCH% -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED=OFF -DZYDIS_VERSION=%BASE%
          if errorlevel 1 exit /b 1
          cmake --build build-static
          if errorlevel 1 exit /b 1
          copy /y build-static\Zydis.lib  "%STAGE%\lib\static\" >nul
          copy /y build-static\Zycore.lib "%STAGE%\lib\static\" >nul

          rem --- shared library (DLL + import .lib) ---
          cmake -S . -B build-shared -G "${{ steps.wdk7.outputs.cmake-generator }}" ^
            -DCMAKE_TOOLCHAIN_FILE="${{ steps.wdk7.outputs.toolchain-file }}" ^
            -DWDK7_ARCH=%ARCH% -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED=ON -DZYDIS_VERSION=%BASE%
          if errorlevel 1 exit /b 1
          cmake --build build-shared
          if errorlevel 1 exit /b 1
          copy /y build-shared\Zydis.dll  "%STAGE%\lib\shared\" >nul
          copy /y build-shared\Zydis.lib  "%STAGE%\lib\shared\" >nul
          copy /y build-shared\Zycore.dll "%STAGE%\lib\shared\" >nul
          copy /y build-shared\Zycore.lib "%STAGE%\lib\shared\" >nul

          cd dist
          tar -a -cf "zydis-v%BASE%-wdk7-%ARCH%.zip" "zydis-v%BASE%-wdk7-%ARCH%"
          dir

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zydis-wdk7-${{ matrix.arch }}
          path: dist/*.zip
          if-no-files-found: error

  # On master, publish an immutable build release v<base>.<build> and roll the
  # v<base> alias release/tag to the same commit so external consumers can always
  # pin the plain Zydis version (e.g. GIT_TAG v4.1.1).
  release:
    needs:
      - version
      - portable
      - package
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: zydis-wdk7-*
          merge-multiple: true

      - name: publish build release and roll alias
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          BASE="${{ needs.version.outputs.base }}"
          VERSION="${{ needs.version.outputs.version }}"
          SHA="${{ github.sha }}"
          ls -la dist

          # 1. immutable per-build release + tag
          gh release create "v${VERSION}" \
            --target "${SHA}" \
            --title "v${VERSION}" \
            --notes "WDK7 (VC9) build of Zydis ${BASE}, CI build ${{ github.run_number }}." \
            dist/*.zip

          # 2. rolling alias: keep ONLY a tag (no release). Drop any pre-existing
          #    v${BASE} release, then point the v${BASE} tag at this commit so
          #    consumers can pin `GIT_TAG v${BASE}` to follow the latest build.
          gh release delete "v${BASE}" --yes 2>/dev/null || true
          git push origin --force "${SHA}:refs/tags/v${BASE}"
